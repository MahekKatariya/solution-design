apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd   # MUST be argocd namespace
spec:
  project: default

  source:
    repoURL: https://github.com/MahekKatariya/solution-design.git
    targetRevision: HEAD
    path: k8s/demo-app

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true