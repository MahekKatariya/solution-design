apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-worker
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-worker
  template:
    metadata:
      labels:
        app: temporal-worker
    spec:
      containers:
        - name: worker
          image: python:3.11-slim
          env:
            - name: TEMPORAL_HOST
              value: "temporal-frontend.temporal:7233"
            - name: TEMPORAL_NAMESPACE
              value: "default"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://lgtm.observibility:4317"
            - name: OTEL_SERVICE_NAME
              value: "temporal-worker"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=temporal-worker,service.version=1.0.0"
          command:
            - /bin/bash
            - -c
            - |
              pip install temporalio opentelemetry-api opentelemetry-sdk opentelemetry-exporter-otlp
              cat > /tmp/worker.py << 'EOF'
              import asyncio
              import logging
              import os
              from datetime import timedelta
              from temporalio import activity, workflow
              from temporalio.client import Client
              from temporalio.worker import Worker
              from temporalio.contrib.opentelemetry import TracingInterceptor

              from opentelemetry import trace
              from opentelemetry.exporter.otlp.proto.grpc.trace_exporter import OTLPSpanExporter
              from opentelemetry.sdk.trace import TracerProvider
              from opentelemetry.sdk.trace.export import BatchSpanProcessor
              from opentelemetry.sdk.resources import Resource

              logging.basicConfig(level=logging.INFO)

              # Initialize OpenTelemetry tracing
              resource = Resource.create({
                  "service.name": os.getenv("OTEL_SERVICE_NAME", "temporal-worker"),
                  "service.version": "1.0.0"
              })

              trace.set_tracer_provider(TracerProvider(resource=resource))
              tracer = trace.get_tracer(__name__)

              # Configure OTLP exporter
              otlp_exporter = OTLPSpanExporter(
                  endpoint=os.getenv("OTEL_EXPORTER_OTLP_ENDPOINT", "http://lgtm.observibility:4317"),
                  insecure=True
              )

              span_processor = BatchSpanProcessor(otlp_exporter)
              trace.get_tracer_provider().add_span_processor(span_processor)

              @activity.defn
              async def say_hello(name: str) -> str:
                  with tracer.start_as_current_span("say_hello_activity") as span:
                      span.set_attribute("activity.input", name)
                      result = f"Hello, {name}!"
                      span.set_attribute("activity.output", result)
                      return result

              @activity.defn
              async def process_data(data: str) -> str:
                  with tracer.start_as_current_span("process_data_activity") as span:
                      span.set_attribute("activity.input", data)
                      span.set_attribute("processing.duration_seconds", 2)
                      await asyncio.sleep(2)
                      result = f"Processed: {data}"
                      span.set_attribute("activity.output", result)
                      return result

              @workflow.defn
              class SampleWorkflow:
                  @workflow.run
                  async def run(self, name: str) -> str:
                      greeting = await workflow.execute_activity(
                          say_hello,
                          name,
                          start_to_close_timeout=timedelta(seconds=10),
                      )
                      processed = await workflow.execute_activity(
                          process_data,
                          f"data for {name}",
                          start_to_close_timeout=timedelta(seconds=30),
                      )
                      return f"{greeting} {processed}"

              async def main():
                  client = await Client.connect(
                      "temporal-frontend.temporal:7233",
                      interceptors=[TracingInterceptor()],
                  )
                  
                  worker = Worker(
                      client,
                      task_queue="sample-task-queue",
                      workflows=[SampleWorkflow],
                      activities=[say_hello, process_data],
                  )
                  
                  print("Starting worker...")
                  await worker.run()

              if __name__ == "__main__":
                  asyncio.run(main())
              EOF
              python /tmp/worker.py
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-starter
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow-starter
  template:
    metadata:
      labels:
        app: workflow-starter
    spec:
      containers:
        - name: starter
          image: python:3.11-slim
          env:
            - name: TEMPORAL_HOST
              value: "temporal-frontend.temporal:7233"
            - name: TEMPORAL_NAMESPACE
              value: "default"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://lgtm.observibility:4317"
            - name: OTEL_SERVICE_NAME
              value: "temporal-workflow-starter"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=temporal-workflow-starter,service.version=1.0.0"
          command:
            - /bin/bash
            - -c
            - |
              pip install temporalio opentelemetry-api opentelemetry-sdk opentelemetry-exporter-otlp
              cat > /tmp/starter.py << 'EOF'
              import asyncio
              import logging
              import os
              import time
              from datetime import timedelta
              from temporalio.client import Client
              from temporalio.common import RetryPolicy
              from temporalio.contrib.opentelemetry import TracingInterceptor

              from opentelemetry import trace
              from opentelemetry.exporter.otlp.proto.grpc.trace_exporter import OTLPSpanExporter
              from opentelemetry.sdk.trace import TracerProvider
              from opentelemetry.sdk.trace.export import BatchSpanProcessor
              from opentelemetry.sdk.resources import Resource

              logging.basicConfig(level=logging.INFO)

              # Initialize OpenTelemetry tracing
              resource = Resource.create({
                  "service.name": os.getenv("OTEL_SERVICE_NAME", "temporal-workflow-starter"),
                  "service.version": "1.0.0"
              })

              trace.set_tracer_provider(TracerProvider(resource=resource))
              tracer = trace.get_tracer(__name__)

              # Configure OTLP exporter
              otlp_exporter = OTLPSpanExporter(
                  endpoint=os.getenv("OTEL_EXPORTER_OTLP_ENDPOINT", "http://lgtm.observibility:4317"),
                  insecure=True
              )

              span_processor = BatchSpanProcessor(otlp_exporter)
              trace.get_tracer_provider().add_span_processor(span_processor)

              async def main():
                  client = await Client.connect(
                      "temporal-frontend.temporal:7233",
                      interceptors=[TracingInterceptor()],
                  )
                  
                  while True:
                      with tracer.start_as_current_span("workflow_execution_cycle") as span:
                          try:
                              workflow_id = f"sample-workflow-{int(time.time())}"
                              
                              with tracer.start_as_current_span("start_workflow") as start_span:
                                  start_span.set_attribute("workflow.id", workflow_id)
                                  start_span.set_attribute("workflow.type", "SampleWorkflow")
                                  
                                  handle = await client.start_workflow(
                                      "SampleWorkflow",
                                      "World",
                                      id=workflow_id,
                                      task_queue="sample-task-queue",
                                      execution_timeout=timedelta(minutes=5),
                                      retry_policy=RetryPolicy(
                                          initial_interval=timedelta(seconds=1),
                                          maximum_interval=timedelta(seconds=10),
                                          maximum_attempts=3,
                                      ),
                                  )
                                  
                                  print(f"Started workflow {workflow_id}")
                              
                              with tracer.start_as_current_span("await_workflow_result") as result_span:
                                  result_span.set_attribute("workflow.id", workflow_id)
                                  result = await handle.result()
                                  result_span.set_attribute("workflow.result", str(result))
                                  print(f"Workflow result: {result}")
                              
                              span.set_attribute("workflow.status", "completed")
                              
                          except Exception as e:
                              span.set_attribute("workflow.status", "failed")
                              span.set_attribute("error.message", str(e))
                              print(f"Error: {e}")
                          
                          await asyncio.sleep(30)

              if __name__ == "__main__":
                  asyncio.run(main())
              EOF
              python /tmp/starter.py
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: temporal-worker
  namespace: default
spec:
  selector:
    app: temporal-worker
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
