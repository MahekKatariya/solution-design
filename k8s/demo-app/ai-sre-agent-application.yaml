apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-sre-agent
  namespace: argocd
spec:
  project: default
  
  source:
    repoURL: https://github.com/MahekKatariya/solution-design.git
    targetRevision: HEAD
    path: k8s/ai-sre-agent
    
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
