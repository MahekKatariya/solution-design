apiVersion: v1
kind: Namespace
metadata:
  name: temporal
  annotations:
    argocd.argoproj.io/sync-wave: '-10'
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: temporal
  namespace: argocd
spec:
  project: default
  
  source:
    repoURL: https://go.temporal.io/helm-charts
    chart: temporal
    targetRevision: 0.37.0
    helm:
      values: |
        server:
          replicaCount: 1

          config:
            logLevel: info
            
            persistence:
              defaultStore: default
              visibilityStore: visibility
              numHistoryShards: 4
              datastores:
                default:
                  sql:
                    driver: "postgres"
                    host: "postgres.temporal.svc.cluster.local"
                    port: 5432
                    database: "temporal"
                    user: "temporal"
                    password: "temporal123"
                    maxConns: 20
                    maxIdleConns: 20
                    maxConnLifetime: "1h"
                visibility:
                  sql:
                    driver: "postgres"
                    host: "postgres.temporal.svc.cluster.local"
                    port: 5432
                    database: "temporal_visibility"
                    user: "temporal"
                    password: "temporal123"
                    maxConns: 10
                    maxIdleConns: 10
                    maxConnLifetime: "1h"
        
        web:
          enabled: true
          replicaCount: 1
          service:
            type: ClusterIP
            port: 8080
        
        postgresql:
          enabled: false
        
        schema:
          setup:
            enabled: true
          update:
            enabled: true

        cassandra:
          enabled: false
        mysql:
          enabled: false
        
        elasticsearch:
          enabled: false
        
        prometheus:
          enabled: false        
        grafana:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: temporal

  syncPolicy:
    automated:
      prune: true
      selfHeal: true