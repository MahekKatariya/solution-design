apiVersion: v1
kind: Namespace
metadata:
  name: observibility
  annotations:
    argocd.argoproj.io/sync-wave: '-10'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm
  namespace: observibility
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lgtm
  template:
    metadata:
      labels:
        app: lgtm
    spec:
      containers:
        - name: lgtm
          image: grafana/otel-lgtm:latest
          ports:
            - containerPort: 3000   # Grafana UI
            - containerPort: 4317   # OTLP gRPC
            - containerPort: 4318   # OTLP HTTP

---
apiVersion: v1
kind: Service
metadata:
  name: lgtm
  namespace: observibility
spec:
  selector:
    app: lgtm
  ports:
    - name: grafana
      port: 3000
      targetPort: 3000
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318