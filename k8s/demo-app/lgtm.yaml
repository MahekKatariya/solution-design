apiVersion: v1
kind: Namespace
metadata:
  name: observibility
  annotations:
    argocd.argoproj.io/sync-wave: '-10'
---
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lgtm-prometheus-config
  namespace: observibility
data:
  prometheus.yml: |

    global:
      scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
      evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
      # scrape_timeout is set to the global default (10s).

    # Alertmanager configuration
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              # - alertmanager:9093

    # Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
    rule_files:
      # - "first_rules.yml"
      # - "second_rules.yml"

    # A scrape configuration containing exactly one endpoint to scrape:
    # Here it's Prometheus itself.
    scrape_configs:
      # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
      - job_name: "prometheus"

        # metrics_path defaults to '/metrics'
        # scheme defaults to 'http'.
        labels:
          app: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: 'demo-app'
        scrape_interval: 5s
        labels:
          app: "demo-app"
        static_configs:
          - targets: ['demo-app.observibility:8000']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm
  namespace: observibility
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lgtm
  template:
    metadata:
      labels:
        app: lgtm
    spec:
      containers:
        - name: lgtm
          image: grafana/otel-lgtm:latest
          ports:
            - containerPort: 3000   # Grafana UI
            - containerPort: 4317   # OTLP gRPC
            - containerPort: 4318   # OTLP HTTP
            - containerPort: 3100
      volumeMounts:
        - name: prometheus-config
          mountPath: /otel-lgtm/prometheus/prometheus.yml
          subPath: prometheus.yml   # 👈 important
  volumes:
    - name: prometheus-config
      configMap:
        name: lgtm-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: lgtm
  namespace: observibility
spec:
  selector:
    app: lgtm
  ports:
    - name: grafana
      port: 3000
      targetPort: 3000
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: loki
      port: 3100
      targetPort: 3100